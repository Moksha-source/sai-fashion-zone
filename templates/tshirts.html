{% extends "base.html" %}

{% block content %}

<h2>T-Shirts Collection</h2>

<div class="product-list">

{% for tshirt in tshirts %}

<div class="product">

    <img src="{{ url_for('static',
            filename='images/' ~ tshirt.image) }}">

    <h3>{{ tshirt.name }}</h3>

    <p>Price: ₹{{ tshirt.price }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
