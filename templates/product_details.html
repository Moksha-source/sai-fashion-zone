{% extends "base.html" %}

{% block content %}

<div class="product-details">

    <h2>{{ product.name }}</h2>

    <img src="{{ url_for('static',
        filename='images/' + product.image) }}"
        width="300">

    <p>
        <strong>Price:</strong>
        ₹{{ product.price }}
    </p>

    <p>
        <strong>Category:</strong>
        {{ product.category }}
    </p>

    {% if product.description %}
    <p>
        <strong>Description:</strong>
        {{ product.description }}
    </p>
    {% else %}
    <p>
        <strong>Description:</strong>
        No description available
    </p>
    {% endif %}

    <br>

    <a href="/" class="btn">
        Back to Catalog
    </a>

</div>

{% endblock %}
