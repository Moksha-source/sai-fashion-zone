{% extends "base.html" %}

{% block content %}

<h2>Night Pants Collection</h2>

<div class="product-list">

{% for nightpant in nightpants %}

<div class="product-card">

    <div class="image-container">
        <img src="{{ url_for('static',
            filename='images/' ~ nightpant.image) }}">
    </div>

    <div class="product-info">
        <h3>{{ nightpant.name }}</h3>
        <p class="price">₹{{ nightpant.price }}</p>
    </div>

</div>

{% endfor %}

</div>

{% endblock %}
