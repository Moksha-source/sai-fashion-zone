{% extends "base.html" %}

{% block content %}

<h2>Pants Collection</h2>

<div class="product-list">

{% for pant in pants %}

<div class="product">

    <img src="{{ url_for('static',
             filename='images/' ~ pant.image) }}">

    <h3>{{ pant.name }}</h3>

    <p>Price: ₹{{ pant.price }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
