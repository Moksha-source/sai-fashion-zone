{% extends "base.html" %}

{% block content %}

<h2>Pants Collection</h2>

<div class="product-list">

{% for pant in pants %}

<div class="product-card">

    <div class="image-container">
        <img src="{{ url_for('static',
            filename='images/' ~ pant.image) }}">
    </div>

    <div class="product-info">
        <h3>{{ pant.name }}</h3>
        <p class="price">₹{{ pant.price }}</p>
    </div>

</div>

{% endfor %}

</div>

{% endblock %}
