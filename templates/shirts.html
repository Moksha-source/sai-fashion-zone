{% extends "base.html" %}

{% block content %}

<h2>Shirts Collection</h2>

<div class="product-list">

{% for shirt in shirts %}

<div class="product">

    <img src="{{ url_for('static',
        filename='images/' ~ shirt.image) }}">

    <h3>{{ shirt.name }}</h3>

    <p>Price: ₹{{ shirt.price }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
